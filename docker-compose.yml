
services:
  app:
    build: . 
    ports: 
    - 8080:8080
    depends_on:
    - db
    environment:
    - DB_HOST=db
  db:
    image: postgres:alpine
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgresql
      - POSTGRES_DB=clubster
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - 5432:5432
volumes:
  postgres_data: